id: nextjs-detection
brief:
  title: Next.js Detection
  by: sxsc
  level: info
  about: Detects Next.js framework — SSR/SSG React application.
  label: [tech, nextjs, react, javascript, vercel]
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/_next/static/chunks/main.js"
    signs:
      - on: word
        has: ["__NEXT_DATA__", "__next", "next-route-announcer", "next/dist"]
        need: any