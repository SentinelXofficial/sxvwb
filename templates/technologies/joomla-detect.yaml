id: joomla-detection
brief:
  title: Joomla CMS Detection
  by: sxsc
  level: info
  about: Detects Joomla content management system.
  label: [tech, cms, joomla, php]
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/administrator/"
      - "{{BaseURL}}/components/com_users/views/login/tmpl/default_login.php"
    signs:
      - on: word
        has: ["joomla", "Joomla", "com_content", "mod_login"]
        need: any