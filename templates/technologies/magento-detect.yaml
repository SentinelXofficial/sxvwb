id: magento-detection
brief:
  title: Magento eCommerce Detection
  by: sxsc
  level: info
  about: Detects Magento eCommerce platform.
  label: [tech, ecommerce, magento, php]
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/admin/"
      - "{{BaseURL}}/customer/account/login/"
    signs:
      - on: word
        has: ["Magento", "magento", "x-magento", "Mage.Cookies"]
        need: any