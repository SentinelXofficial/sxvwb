id: fastly-cdn-detection
brief:
  title: Fastly CDN Detection
  by: sxsc
  level: info
  about: Detects Fastly CDN — useful for cache poisoning tests.
  label: [tech, fastly, cdn, cache]
moves:
  - verb: GET
    to: ["{{BaseURL}}/"]
    signs:
      - on: word
        has: ["Fastly", "x-served-by", "x-cache", "x-cache-hits", "x-timer"]
        in: header
        need: any