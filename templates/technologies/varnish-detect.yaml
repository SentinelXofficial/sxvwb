id: varnish-cache-detection
brief:
  title: Varnish Cache Detection
  by: sxsc
  level: info
  about: Detects Varnish HTTP cache — useful for cache poisoning tests.
  label: [tech, varnish, cache]
moves:
  - verb: GET
    to: ["{{BaseURL}}/"]
    signs:
      - on: word
        has: ["Varnish", "X-Varnish", "via: varnish", "X-Cache-Hits"]
        in: header
        need: any