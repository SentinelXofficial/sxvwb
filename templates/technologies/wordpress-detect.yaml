id: wordpress-detection
brief:
  title: WordPress CMS Detection
  by: sxsc
  level: info
  about: Detects if the target is running WordPress.
  label:
    - tech
    - cms
    - wordpress
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/wp-login.php"
    signs:
      - on: word
        has:
          - "wp-submit"
          - "wordpress"
        need: any
      - on: status
        status:
          - 200
  - verb: GET
    to:
      - "{{BaseURL}}/wp-content/"
    signs:
      - on: status
        status:
          - 200
          - 301
          - 302
          - 403
  - verb: GET
    to:
      - "{{BaseURL}}/xmlrpc.php"
    signs:
      - on: word
        has:
          - "XML-RPC"
