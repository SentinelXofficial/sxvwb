id: cloudflare-detection
brief:
  title: Cloudflare CDN Detection
  by: sxsc
  level: info
  about: Detects Cloudflare CDN/WAF in front of the application.
  label: [tech, cloudflare, cdn, waf]
moves:
  - verb: GET
    to: ["{{BaseURL}}/"]
    signs:
      - on: word
        has: ["cloudflare", "cf-ray", "cf-cache-status", "__cfduid"]
        in: header
        need: any