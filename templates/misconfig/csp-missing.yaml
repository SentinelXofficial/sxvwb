id: content-security-policy-missing
brief:
  title: Content-Security-Policy Header Missing
  by: sxsc
  level: medium
  about: No CSP header — increased risk of XSS, data injection, and clickjacking.
  label: [misconfig, csp, headers, xss]
  score: "5.4 MEDIUM"
moves:
  - verb: GET
    to: ["{{BaseURL}}/"]
    signs:
      - on: word
        has: ["Content-Security-Policy", "X-Content-Security-Policy"]
        in: header
        flip: true
        need: all
      - on: status
        status: [200]