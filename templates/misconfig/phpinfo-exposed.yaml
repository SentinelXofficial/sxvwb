id: phpinfo-exposed
brief:
  title: PHP info() Page Exposed
  by: sxsc
  level: medium
  about: Detects exposed phpinfo() pages revealing full server configuration.
  label: [misconfig, php, information-disclosure]
  score: "5.3 MEDIUM"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/phpinfo.php"
      - "{{BaseURL}}/info.php"
      - "{{BaseURL}}/php_info.php"
      - "{{BaseURL}}/test.php?=PHPE9568F34"
      - "{{BaseURL}}/admin/phpinfo.php"
      - "{{BaseURL}}/phpmyadmin/phpinfo.php"
    signs:
      - on: word
        has: ["PHP Version", "phpinfo()", "php.ini", "Configure Command"]
        need: all
      - on: status
        status: [200]