id: http-trace-method-enabled
brief:
  title: HTTP TRACE Method Enabled
  by: sxsc
  level: medium
  about: Detects servers with TRACE method enabled — XST (Cross-Site Tracing) possible.
  label: [misconfig, http, xst, trace]
  score: "6.1 MEDIUM"
moves:
  - verb: TRACE
    to: ["{{BaseURL}}/"]
    head:
      X-SXSC-Test: sxsctrace
    signs:
      - on: word
        has: ["TRACE", "sxsctrace", "X-SXSC-Test"]
        need: all