id: technology-disclosure-headers
brief:
  title: Technology Disclosure via Response Headers
  by: sxsc
  level: info
  about: Server leaks technology stack via X-Powered-By and Server headers.
  label: [misconfig, information-disclosure, fingerprinting]
moves:
  - verb: GET
    to: ["{{BaseURL}}/"]
    signs:
      - on: word
        has: ["X-Powered-By", "Server:", "X-Generator", "X-Drupal", "X-Varnish"]
        in: header
        need: any