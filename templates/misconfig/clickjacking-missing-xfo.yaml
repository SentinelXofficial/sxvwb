id: clickjacking-x-frame-options-missing
brief:
  title: Clickjacking — X-Frame-Options Missing
  by: sxsc
  level: medium
  about: Response lacks X-Frame-Options header — site can be iframed (clickjacking).
  label: [misconfig, clickjacking, headers, ui-redress]
  score: "6.1 MEDIUM"
moves:
  - verb: GET
    to: ["{{BaseURL}}/"]
    signs:
      - on: word
        has: ["X-Frame-Options"]
        in: header
        flip: true
      - on: status
        status: [200]