id: spring-boot-debug-mode
brief:
  title: Spring Boot Detailed Errors Enabled
  by: sxsc
  level: medium
  about: Detects Spring Boot applications with server.error.include-stacktrace=always.
  label: [misconfig, spring, java, debug, information-disclosure]
  score: "5.3 MEDIUM"
moves:
  - verb: GET
    to: ["{{BaseURL}}/actuator"]
    signs:
      - on: word
        has: ["spring", "actuator", "health"]
        need: any
      - on: status
        status: [200]