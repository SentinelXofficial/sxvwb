id: directory-listing-enabled
brief:
  title: Directory Listing Enabled
  by: sxsc
  level: medium
  about: Web server has directory listing enabled, exposing file structure.
  label: [misconfig, web-server, information-disclosure]
  score: "5.3 MEDIUM"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/uploads/"
      - "{{BaseURL}}/images/"
      - "{{BaseURL}}/files/"
      - "{{BaseURL}}/assets/"
      - "{{BaseURL}}/static/"
      - "{{BaseURL}}/downloads/"
      - "{{BaseURL}}/backup/"
    signs:
      - on: word
        has: ["Index of /", "Parent Directory", "Directory Listing"]
        need: any
      - on: status
        status: [200]