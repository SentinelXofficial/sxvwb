id: laravel-debug-mode
brief:
  title: Laravel Debug Mode Enabled
  by: sxsc
  level: high
  about: Detects Laravel applications with APP_DEBUG=true in production.
  label: [misconfig, laravel, php, debug, information-disclosure]
  score: "7.5 HIGH"
moves:
