id: strict-transport-security-missing
brief:
  title: HSTS (Strict-Transport-Security) Missing
  by: sxsc
  level: medium
  about: HTTPS site missing HSTS header — vulnerable to SSL stripping attacks.
  label: [misconfig, hsts, headers, ssl, mitm]
  score: "5.9 MEDIUM"
moves:
  - verb: GET
    to: ["{{BaseURL}}/"]
    signs:
      - on: word
        has: ["Strict-Transport-Security"]
        in: header
        flip: true
      - on: status
        status: [200]