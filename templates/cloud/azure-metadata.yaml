id: azure-instance-metadata-exposed
brief:
  title: Azure Instance Metadata Exposed
  by: sxsc
  level: critical
  about: Azure IMDS accessible — managed identity token leak possible.
  label: [cloud, azure, microsoft, metadata, credentials, critical]
  score: "9.8 CRITICAL"
moves:
  - verb: GET
    to: ["{{BaseURL}}/metadata/instance?api-version=2021-02-01"]
    head:
      Metadata: "true"
    signs:
      - on: word
        has: ["vmId", "subscriptionId", "resourceGroupName", "azEnvironment"]
        need: any