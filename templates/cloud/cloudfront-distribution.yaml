id: cloudfront-distribution-detection
brief:
  title: AWS CloudFront Distribution Detected
  by: sxsc
  level: info
  about: Detects AWS CloudFront CDN — useful for origin bypass testing.
  label: [cloud, aws, cloudfront, cdn]
moves:
  - verb: GET
    to: ["{{BaseURL}}/"]
    signs:
      - on: word
        has: ["CloudFront", "X-Amz-Cf-Id", "X-Amz-Cf-Pop"]
        in: header
        need: any