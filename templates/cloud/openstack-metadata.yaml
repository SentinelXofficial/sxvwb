id: openstack-metadata-exposed
brief:
  title: OpenStack Metadata Exposed
  by: sxsc
  level: high
  about: OpenStack metadata service accessible.
  label: [cloud, openstack, metadata, credentials]
  score: "8.8 HIGH"
moves:
