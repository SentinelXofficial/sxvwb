id: gcp-instance-metadata-exposed
brief:
  title: GCP Instance Metadata Exposed
  by: sxsc
  level: critical
  about: GCP metadata endpoint accessible — service account token leak possible.
  label: [cloud, gcp, google, metadata, credentials, critical]
  score: "9.8 CRITICAL"
moves:
  - verb: GET
    to: ["{{BaseURL}}/computeMetadata/v1/"]
    head:
      Metadata-Flavor: Google
    signs:
      - on: word
        has: ["computeMetadata", "instance", "project", "service-accounts"]
        need: any