id: drupal-sensitive-files
brief:
  title: Drupal Sensitive Files
  by: sxsc
  level: medium
  about: Detects exposed Drupal configuration and update files.
  label: [cms, drupal, configuration, exposure]
  score: "5.3 MEDIUM"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/sites/default/settings.php"
      - "{{BaseURL}}/sites/default/services.yml"
      - "{{BaseURL}}/CHANGELOG.txt"
      - "{{BaseURL}}/core/CHANGELOG.txt"
      - "{{BaseURL}}/update.php"
      - "{{BaseURL}}/install.php"
    signs:
      - on: word
        has: ["Drupal", "database", "password", "settings"]
        need: any