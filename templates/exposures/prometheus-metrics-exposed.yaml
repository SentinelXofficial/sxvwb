id: prometheus-metrics-exposed
brief:
  title: Prometheus Metrics Endpoint Exposed
  by: sxsc
  level: medium
  about: Prometheus /metrics endpoint exposed — internal infrastructure details leaked.
  label: [exposure, prometheus, monitoring, information-disclosure]
  score: "5.3 MEDIUM"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/metrics"
      - "{{BaseURL}}/prometheus/metrics"
    signs:
      - on: word
        has: ["go_gc_duration", "http_requests_total", "process_cpu", "promhttp"]
        need: any
      - on: status
        status: [200]