id: ray-dashboard-exposed
brief:
  title: Ray Dashboard / API Exposed
  by: sxsc
  level: critical
  about: Ray dashboard accessible without auth — arbitrary code execution possible (CVE-2023-48022).
  label: [exposure, ray, ai, ml, rce, critical]
  score: "9.8 CRITICAL"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/api/jobs/"
      - "{{BaseURL}}/api/cluster_status"
      - "{{BaseURL}}/dashboard/"
    signs:
      - on: word
        has: ["ray", "Ray", "jobs", "cluster"]
        need: any