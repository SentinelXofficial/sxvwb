id: aws-credentials-exposed
brief:
  title: AWS Credentials File Exposed
  by: sxsc
  level: critical
  about: AWS credentials file accessible via web — potential cloud account compromise.
  label: [exposure, aws, cloud, credentials, critical]
  score: "9.8 CRITICAL"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/.aws/credentials"
      - "{{BaseURL}}/aws/credentials"
      - "{{BaseURL}}/.aws/config"
    signs:
      - on: word
        has: ["aws_access_key_id", "aws_secret_access_key", "AKIA"]
        need: any
      - on: status
        status: [200]