id: database-backup-exposed
brief:
  title: Database Backup / Dump Files Exposed
  by: sxsc
  level: critical
  about: Database backup files accessible — full data breach possible.
  label: [exposure, database, backup, critical]
  score: "9.8 CRITICAL"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/dump.sql"
      - "{{BaseURL}}/backup.sql"
      - "{{BaseURL}}/database.sql"
      - "{{BaseURL}}/db.sql"
      - "{{BaseURL}}/db_backup.sql"
      - "{{BaseURL}}/data.sql"
      - "{{BaseURL}}/backup/db.sql"
      - "{{BaseURL}}/backups/database.sql"
      - "{{BaseURL}}/db/dump.sql"
    signs:
      - on: word
        has: ["CREATE TABLE", "INSERT INTO", "DROP TABLE", "-- MySQL dump"]
        need: any
      - on: status
        status: [200]