id: kubernetes-dashboard-exposed
brief:
  title: Kubernetes Dashboard Exposed
  by: sxsc
  level: high
  about: Unauthenticated Kubernetes dashboard accessible — cluster compromise possible.
  label: [exposure, kubernetes, cloud, container, dashboard]
  score: "8.8 HIGH"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/api/v1/namespaces/kube-system/services/https:kubernetes-dashboard:/proxy/
      - "{{BaseURL}}/api/v1/namespaces"
    signs:
      - on: word
        has: ["kube-system", "kubernetes", "namespaces", "pods"]
        need: any