id: default-login-pages
brief:
  title: Default Application Login Pages
  by: sxsc
  level: info
  about: Discovers default login pages for common applications.
  label: [defaults, login, enumeration, discovery]
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/signin"
      - "{{BaseURL}}/signup"
      - "{{BaseURL}}/register"
      - "{{BaseURL}}/auth/login"
      - "{{BaseURL}}/account/login"
      - "{{BaseURL}}/user/login"
      - "{{BaseURL}}/users/sign_in"
      - "{{BaseURL}}/oauth/authorize"
      - "{{BaseURL}}/sso/login"
      - "{{BaseURL}}/api/login"
    signs:
      - on: word
        has: ["login", "sign in", "username", "email", "password"]
        need: any