id: default-installation-pages
brief:
  title: Installation / Setup Wizards Exposed
  by: sxsc
  level: critical
  about: Application install/setup wizards exposed — site takeover possible.
  label: [defaults, installation, setup, critical]
  score: "9.8 CRITICAL"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/install/"
      - "{{BaseURL}}/install.php"
      - "{{BaseURL}}/setup/"
      - "{{BaseURL}}/setup.php"
      - "{{BaseURL}}/install/index.php"
      - "{{BaseURL}}/installation/
      - "{{BaseURL}}/wp-admin/install.php"
      - "{{BaseURL}}/core/install.php"
    signs:
      - on: word
        has: ["install", "setup", "wizard", "database setup", "configuration"]
        need: any