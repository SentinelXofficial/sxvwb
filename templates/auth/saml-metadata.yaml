id: saml-metadata-exposed
brief:
  title: SAML Metadata Exposed
  by: sxsc
  level: medium
  about: SAML SP metadata publicly accessible — federation details leaked.
  label: [auth, saml, sso, metadata]
  score: "5.3 MEDIUM"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/saml/metadata"
      - "{{BaseURL}}/auth/saml/metadata"
      - "{{BaseURL}}/sso/saml/metadata"
      - "{{BaseURL}}/FederationMetadata.xml"
    signs:
      - on: word
        has: ["EntityDescriptor", "IDPSSODescriptor", "X509Certificate", "AssertionConsumerService"]
        need: any