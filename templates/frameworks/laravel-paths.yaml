id: laravel-sensitive-paths
brief:
  title: Laravel Sensitive Paths
  by: sxsc
  level: high
  about: Detects exposed Laravel configuration and debug paths.
  label: [framework, laravel, php, configuration, debug]
  score: "7.5 HIGH"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/storage/logs/laravel.log"
      - "{{BaseURL}}/storage/logs/laravel.log"
      - "{{BaseURL}}/_ignition/health-check"
      - "{{BaseURL}}/_debugbar/open"
      - "{{BaseURL}}/telescope/requests"
      - "{{BaseURL}}/horizon/dashboard"
    signs:
      - on: word
        has: ["APP_KEY", "DB_PASSWORD", "Ignition", "laravel", "Telescope"]
        need: any