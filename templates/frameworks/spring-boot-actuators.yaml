id: spring-boot-actuator-endpoints
brief:
  title: Spring Boot Actuator Endpoints Discovery
  by: sxsc
  level: high
  about: Probes all Spring Boot actuator endpoints — env, heapdump, mappings, etc.
  label: [framework, spring, java, actuator, information-disclosure]
  score: "7.5 HIGH"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/actuator"
      - "{{BaseURL}}/actuator/env"
      - "{{BaseURL}}/actuator/heapdump"
      - "{{BaseURL}}/actuator/threaddump"
      - "{{BaseURL}}/actuator/mappings"
      - "{{BaseURL}}/actuator/beans"
      - "{{BaseURL}}/actuator/configprops"
      - "{{BaseURL}}/actuator/logfile"
      - "{{BaseURL}}/actuator/gateway/routes"
      - "{{BaseURL}}/actuator/sessions"
    signs:
      - on: word
        has: ["spring", "actuator", "endpoints", "beans", "mappings", "heapdump"]
        need: any