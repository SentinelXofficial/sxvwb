id: nginx-status-page-exposed
brief:
  title: Nginx Status / Stub Status Page Exposed
  by: sxsc
  level: medium
  about: Nginx ngx_http_stub_status_module page exposed — active connections leaked.
  label: [network, nginx, status, exposure]
  score: "5.3 MEDIUM"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/nginx_status"
      - "{{BaseURL}}/status"
      - "{{BaseURL}}/nginx-status"
      - "{{BaseURL}}/stub_status"
    signs:
      - on: word
        has: ["Active connections:", "server accepts", "Reading:", "Writing:"]
        need: any