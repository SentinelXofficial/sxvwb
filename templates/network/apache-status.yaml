id: apache-server-status-exposed
brief:
  title: Apache mod_status Page Exposed
  by: sxsc
  level: medium
  about: Apache server-status page exposed — active requests and uptime leaked.
  label: [network, apache, status, exposure]
  score: "5.3 MEDIUM"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/server-status"
      - "{{BaseURL}}/server-status?auto"
      - "{{BaseURL}}/status?auto"
    signs:
      - on: word
        has: ["Apache Server Status", "Total Accesses:", "Server Uptime:"]
        need: any