id: php-fpm-status-exposed
brief:
  title: PHP-FPM Status Page Exposed
  by: sxsc
  level: medium
  about: PHP-FPM status page exposed — pool metrics and process details leaked.
  label: [network, php, fpm, status, exposure]
  score: "5.3 MEDIUM"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/php-fpm-status"
      - "{{BaseURL}}/fpm-status"
      - "{{BaseURL}}/status?json
    signs:
      - on: word
        has: ["pool:", "process manager:", "start time:", "accepted conn:"]
        need: any