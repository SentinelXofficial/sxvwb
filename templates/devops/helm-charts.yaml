id: helm-chart-exposed
brief:
  title: Helm Chart / Tiller Exposed
  by: sxsc
  level: high
  about: Helm chart or Tiller API exposed — Kubernetes deployment info leaked.
  label: [devops, helm, kubernetes, api, exposure]
  score: "7.5 HIGH"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/Chart.yaml"
      - "{{BaseURL}}/values.yaml"
      - "{{BaseURL}}/helm/v2/releases"
    signs:
      - on: word
        has: ["apiVersion:", "chart:", "helm", "releases"]
        need: any