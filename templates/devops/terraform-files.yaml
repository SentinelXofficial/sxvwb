id: terraform-state-exposed
brief:
  title: Terraform State & Configuration Exposed
  by: sxsc
  level: critical
  about: Terraform state files exposed — cloud infrastructure secrets leaked.
  label: [devops, terraform, cloud, secrets, critical]
  score: "9.8 CRITICAL"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/terraform.tfstate"
      - "{{BaseURL}}/terraform.tfstate.backup"
      - "{{BaseURL}}/.terraform/terraform.tfstate"
      - "{{BaseURL}}/main.tf"
      - "{{BaseURL}}/terraform.tfvars"
      - "{{BaseURL}}/variables.tf"
      - "{{BaseURL}}/.terraform.lock.hcl"
    signs:
      - on: word
        has: ["terraform", "tfstate", "resource", "provider", "aws_access_key", "secret"]
        need: any