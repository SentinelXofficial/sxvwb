id: api-version-discovery
brief:
  title: API Version Endpoint Discovery
  by: sxsc
  level: info
  about: Discovers API version endpoints for attack surface mapping.
  label: [api, version, discovery]
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/api/v1/"
      - "{{BaseURL}}/api/v2/"
      - "{{BaseURL}}/api/v3/"
      - "{{BaseURL}}/v1/"
      - "{{BaseURL}}/v2/"
      - "{{BaseURL}}/api/version"
      - "{{BaseURL}}/api/health"
      - "{{BaseURL}}/api/status"
      - "{{BaseURL}}/health"
      - "{{BaseURL}}/healthz"
      - "{{BaseURL}}/ping"
    signs:
      - on: word
        has: ["version", "status", "health", "ok", "pong", "api"]
        need: any