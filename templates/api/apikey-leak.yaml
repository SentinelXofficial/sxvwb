id: api-key-header-leak
brief:
  title: API Key Leaked in Response
  by: sxsc
  level: critical
  about: Detects API keys or tokens exposed in response bodies or headers.
  label: [api, credentials, api-key, information-disclosure, critical]
  score: "9.8 CRITICAL"
moves:
  - verb: GET
    to: ["{{BaseURL}}/"]
    signs:
      - on: pattern
        pattern:
          - '(?i)(api[_-]?key|api[_-]?secret|access[_-]?token|auth[_-]?token|bearer[_-]?token)["\s:=]+["']?[A-Za-z0-9_\-\.]{20,}'
        need: any