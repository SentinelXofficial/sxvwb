id: admin-panels-discovery
brief:
  title: Admin Panels Discovery
  by: sxsc
  level: info
  about: Discovers common admin, login, and management panels.
  label: [panel, admin, discovery, login]
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/admin/"
      - "{{BaseURL}}/admin/login"
      - "{{BaseURL}}/administrator/"
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/wp-admin/"
      - "{{BaseURL}}/user/login"
      - "{{BaseURL}}/signin"
      - "{{BaseURL}}/panel/"
      - "{{BaseURL}}/dashboard/"
      - "{{BaseURL}}/backend/"
      - "{{BaseURL}}/manage/"
      - "{{BaseURL}}/controlpanel/"
      - "{{BaseURL}}/cpanel/"
      - "{{BaseURL}}/siteadmin/"
      - "{{BaseURL}}/member/"
    signs:
      - on: word
        has: ["login", "password", "username", "sign in", "admin"]
        need: any
      - on: status
        status: [200, 301, 302, 403]