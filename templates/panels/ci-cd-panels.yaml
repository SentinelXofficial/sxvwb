id: cicd-panels-discovery
brief:
  title: CI/CD Panels Discovery
  by: sxsc
  level: info
  about: Discovers CI/CD and DevOps management panels.
  label: [panel, cicd, devops, jenkins, gitlab]
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/jenkins/"
      - "{{BaseURL}}/job/"
      - "{{BaseURL}}/build/"
      - "{{BaseURL}}/gitlab/"
      - "{{BaseURL}}/users/sign_in"
      - "{{BaseURL}}/bitbucket/"
      - "{{BaseURL}}/teamcity/"
      - "{{BaseURL}}/bamboo/"
      - "{{BaseURL}}/drone/"
      - "{{BaseURL}}/circleci/"
    signs:
      - on: word
        has: ["Jenkins", "GitLab", "Bitbucket", "TeamCity", "login"]
        need: any