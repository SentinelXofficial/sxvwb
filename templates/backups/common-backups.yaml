id: common-backup-files-exposed
brief:
  title: Common Backup & Archive Files Exposed
  by: sxsc
  level: high
  about: Detects common backup archive files that may contain source code or data.
  label: [backups, files, exposure, source-code]
  score: "7.5 HIGH"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/backup.zip"
      - "{{BaseURL}}/backup.tar.gz"
      - "{{BaseURL}}/site.zip"
      - "{{BaseURL}}/www.zip"
      - "{{BaseURL}}/web.zip"
      - "{{BaseURL}}/source.zip"
      - "{{BaseURL}}/code.zip"
      - "{{BaseURL}}/archive.zip"
      - "{{BaseURL}}/old.zip"
      - "{{BaseURL}}/dev.zip"
      - "{{BaseURL}}/staging.zip"
      - "{{BaseURL}}/backup.rar"
      - "{{BaseURL}}/backup.7z"
      - "{{BaseURL}}/db_backup.gz"
    signs:
      - on: status
        status: [200]