id: docker-files-exposed
brief:
  title: Docker / Container Files Exposed
  by: sxsc
  level: medium
  about: Docker configuration files exposed — infrastructure details leaked.
  label: [files, docker, container, configuration]
  score: "5.3 MEDIUM"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/Dockerfile"
      - "{{BaseURL}}/docker-compose.yml"
      - "{{BaseURL}}/docker-compose.yaml"
      - "{{BaseURL}}/.dockerignore"
      - "{{BaseURL}}/.docker/config.json"
    signs:
      - on: word
        has: ["FROM", "docker", "container", "services:", "image:"]
        need: any
      - on: status
        status: [200]