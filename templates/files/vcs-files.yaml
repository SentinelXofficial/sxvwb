id: vcs-files-exposed
brief:
  title: Version Control Files Exposed
  by: sxsc
  level: high
  about: Git, SVN, Mercurial metadata exposed — source code leak possible.
  label: [files, git, svn, vcs, source-code]
  score: "7.5 HIGH"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/.git/HEAD"
      - "{{BaseURL}}/.git/config"
      - "{{BaseURL}}/.git/index"
      - "{{BaseURL}}/.gitignore"
      - "{{BaseURL}}/.svn/entries"
      - "{{BaseURL}}/.svn/wc.db"
      - "{{BaseURL}}/.hg/hgrc"
      - "{{BaseURL}}/.hg/store/"
      - "{{BaseURL}}/.bzr/branch-format"
    signs:
      - on: word
        has: ["ref:", "[core]", "DIRC", "svn:", "Mercurial"]
        need: any
      - on: status
        status: [200]