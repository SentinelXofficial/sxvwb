id: ide-project-files-exposed
brief:
  title: IDE / Editor Project Files Exposed
  by: sxsc
  level: low
  about: IDE project and editor configuration files exposed.
  label: [files, ide, configuration]
  score: "3.7 LOW"
moves:
  - verb: GET
    to:
      - "{{BaseURL}}/.vscode/settings.json"
      - "{{BaseURL}}/.idea/workspace.xml"
      - "{{BaseURL}}/.project"
      - "{{BaseURL}}/.classpath"
      - "{{BaseURL}}/.settings/"
      - "{{BaseURL}}/nbproject/project.xml"
    signs:
      - on: word
        has: ["project", "settings", "configuration", "classpathentry"]
        need: any